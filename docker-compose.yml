
services:
  db:
    image: postgis/postgis:16-3.4-alpine
    container_name: gis_db
    environment:
      POSTGRES_USER: gis_user
      POSTGRES_PASSWORD: gis_password
      POSTGRES_DB: gis_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gis_user -d gis_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: gis_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DJANGO_SETTINGS_MODULE=flood_risk_app.settings
      - DATABASE_URL=postgis://gis_user:gis_password@db:5432/gis_db
    stdin_open: true
    tty: true

volumes:
  postgres_data:
